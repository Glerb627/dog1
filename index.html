<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OPERATION: NIGHTFALL</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
        
        body, html { margin: 0; padding: 0; overflow: hidden; background-color: #050505; user-select: none; font-family: 'Share Tech Mono', monospace; }
        canvas { display: block; }
        
        /* Gritty Menu Overlay */
        #menu {
            position: absolute; inset: 0; background: radial-gradient(circle, rgba(10,10,15,0.8) 0%, rgba(0,0,0,1) 100%);
            display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10;
        }
        
        /* Scanline effect */
        #menu::after {
            content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2; background-size: 100% 2px, 3px 100%; pointer-events: none;
        }

        h1 { color: #ff3300; font-size: 5rem; margin: 0; text-transform: uppercase; letter-spacing: 10px; text-shadow: 2px 2px 0px #330000, -2px -2px 10px #ff3300; z-index: 3;}
        .subtitle { color: #888; font-size: 1.2rem; margin-bottom: 40px; letter-spacing: 5px; z-index: 3;}
        
        .briefing { border-left: 3px solid #ff3300; padding-left: 15px; color: #aaa; margin-bottom: 40px; max-width: 500px; z-index: 3;}
        
        .btn {
            padding: 15px 40px; background: transparent; color: #ff3300; border: 2px solid #ff3300;
            font-size: 1.5rem; font-family: inherit; cursor: pointer; text-transform: uppercase; letter-spacing: 3px;
            transition: all 0.2s; z-index: 3; position: relative; overflow: hidden;
        }
        .btn:hover { background: #ff3300; color: #000; box-shadow: 0 0 20px #ff3300; }
        
        #crosshair {
            position: absolute; top: 50%; left: 50%; width: 20px; height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3); border-radius: 50%;
            transform: translate(-50%, -50%); pointer-events: none; display: none; z-index: 5;
        }
        #crosshair::after { content: ''; position: absolute; top: 8px; left: 8px; width: 4px; height: 4px; background: rgba(255, 50, 0, 0.8); border-radius: 50%; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="menu">
        <h1>NIGHTFALL</h1>
        <div class="subtitle">TACTICAL AIR SUPERIORITY</div>
        <div class="briefing">
            <p>> TARGET: HOSTILE DRONES IN SECTOR 4.</p>
            <p>> CONTROLS: MOUSE TO STEER. HOLD [W] TO THROTTLE UP. [S] TO AIRBRAKE. LEFT CLICK TO ENGAGE.</p>
            <p>> WARNING: NO HUD AVAILABLE. RELY ON VISUALS.</p>
        </div>
        <button class="btn" id="start-btn">Deploy</button>
    </div>

    <div id="crosshair"></div>

<script>
    let isPlaying = false;

    // --- DOM Elements ---
    const menu = document.getElementById('menu');
    const startBtn = document.getElementById('start-btn');
    const crosshair = document.getElementById('crosshair');

    startBtn.addEventListener('click', () => {
        menu.style.display = 'none';
        crosshair.style.display = 'block';
        isPlaying = true;
        document.body.requestPointerLock(); // Lock cursor to game
    });

    // --- 3D Engine Setup ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0c10); // Dark gritty sky
    scene.fog = new THREE.FogExp2(0x0a0c10, 0.0008); // Thick atmosphere

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 10000);
    const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // --- Lighting ---
    const ambientLight = new THREE.AmbientLight(0x111122, 1);
    scene.add(ambientLight);
    const moonLight = new THREE.DirectionalLight(0x445588, 1.5); // Cold moonlight
    moonLight.position.set(500, 1000, -1000);
    scene.add(moonLight);
    const rimLight = new THREE.DirectionalLight(0xff4400, 0.5); // Gritty sunset/fire bounce light
    rimLight.position.set(-500, 100, -500);
    scene.add(rimLight);

    // --- Procedural Mountain Terrain ---
    // Creating a massive rugged terrain using math
    const terrainGeo = new THREE.PlaneGeometry(12000, 12000, 120, 120);
    terrainGeo.rotateX(-Math.PI / 2);
    const pos = terrainGeo.attributes.position;
    for (let i = 0; i < pos.count; i++) {
        let x = pos.getX(i);
        let z = pos.getZ(i);
        // Math magic to make mountains and valleys
        let y = Math.sin(x/500)*400 + Math.cos(z/400)*400;
        y += Math.sin(x/150)*100 + Math.cos(z/100)*100; // Detail noise
        if (y < 0) y = 0; // Flatten valleys slightly
        pos.setY(i, y);
    }
    terrainGeo.computeVertexNormals();

    const terrainMat = new THREE.MeshStandardMaterial({ 
        color: 0x111511, // Dark military green/black
        roughness: 0.9, 
        metalness: 0.1,
        flatShading: true // Gives it that gritty, sharp look
    });
    const terrain = new THREE.Mesh(terrainGeo, terrainMat);
    scene.add(terrain);

    // --- Detailed Fighter Jet Model ---
    const plane = new THREE.Group();
    const darkMetal = new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.5, metalness: 0.6 });
    
    // Fuselage
    const fuseGeo = new THREE.CylinderGeometry(0.5, 1.2, 8, 8);
    fuseGeo.rotateX(Math.PI / 2);
    const fuselage = new THREE.Mesh(fuseGeo, darkMetal);
    plane.add(fuselage);

    // Swept Wings
    const wingShape = new THREE.Shape();
    wingShape.moveTo(0, 0); wingShape.lineTo(4, -2); wingShape.lineTo(4, 1); wingShape.lineTo(0, 3);
    const extrudeSettings = { depth: 0.2, bevelEnabled: false };
    const rWing = new THREE.Mesh(new THREE.ExtrudeGeometry(wingShape, extrudeSettings), darkMetal);
    rWing.rotation.x = Math.PI / 2; rWing.position.set(0.8, 0, 1);
    plane.add(rWing);
    const lWing = new THREE.Mesh(new THREE.ExtrudeGeometry(wingShape, extrudeSettings), darkMetal);
    lWing.rotation.x = Math.PI / 2; lWing.rotation.z = Math.PI; lWing.position.set(-0.8, 0, 1);
    plane.add(lWing);

    // Twin Tails
    const tailGeo = new THREE.BoxGeometry(0.1, 1.5, 1.5);
    const rTail = new THREE.Mesh(tailGeo, darkMetal);
    rTail.position.set(0.8, 1, 3.5); rTail.rotation.z = -0.2;
    plane.add(rTail);
    const lTail = new THREE.Mesh(tailGeo, darkMetal);
    lTail.position.set(-0.8, 1, 3.5); lTail.rotation.z = 0.2;
    plane.add(lTail);

    plane.position.set(0, 1500, 0); // Start high above mountains
    scene.add(plane);

    // --- Particles & Details ---
    const engineFlames = [];
    function createEngineFlame() {
        const mat = new THREE.MeshBasicMaterial({ color: 0xffaa00, transparent: true, opacity: 0.8 });
        const mesh = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.4, 0.4), mat);
        scene.add(mesh);
        engineFlames.push({ mesh: mesh, life: 1.0 });
    }

    const bullets = [];
    const enemies = [];

    // --- Input Handling (Mouse Aim) ---
    const input = { throttle: 0, brake: false, firing: false };
    const mouse = { x: 0, y: 0 }; // Normalized screen coordinates

    document.addEventListener('mousemove', (e) => {
        if (!isPlaying) return;
        // When pointer is locked, use movement delta to update target
        mouse.x += e.movementX * 0.002;
        mouse.y += e.movementY * 0.002;
        // Clamp to prevent spinning out of control
        mouse.x = Math.max(-1, Math.min(1, mouse.x));
        mouse.y = Math.max(-1, Math.min(1, mouse.y));
    });

    // Auto-center mouse slowly so plane levels out if you stop moving the mouse
    setInterval(() => {
        if(isPlaying) {
            mouse.x *= 0.95;
            mouse.y *= 0.95;
        }
    }, 50);

    window.addEventListener('keydown', (e) => {
        if (e.key.toLowerCase() === 'w') input.throttle = 1;
        if (e.key.toLowerCase() === 's') input.brake = true;
    });
    window.addEventListener('keyup', (e) => {
        if (e.key.toLowerCase() === 'w') input.throttle = 0;
        if (e.key.toLowerCase() === 's') input.brake = false;
    });
    window.addEventListener('mousedown', () => input.firing = true);
    window.addEventListener('window', () => input.firing = false);
    window.addEventListener('mouseup', () => input.firing = false);

    // --- AI Enemies ---
    function spawnEnemy() {
        const enemy = new THREE.Mesh(new THREE.ConeGeometry(1, 4, 4), new THREE.MeshStandardMaterial({color: 0xff1111}));
        enemy.rotation.x = -Math.PI / 2;
        enemy.position.set(
            plane.position.x + (Math.random() - 0.5) * 3000,
            plane.position.y + (Math.random() - 0.5) * 1000,
            plane.position.z - 2000 - Math.random() * 2000
        );
        scene.add(enemy);
        enemies.push({ mesh: enemy, hp: 5 });
    }
    for(let i=0; i<8; i++) spawnEnemy();

    function explode(pos) {
        for(let i=0; i<15; i++) {
            const m = new THREE.Mesh(new THREE.BoxGeometry(2,2,2), new THREE.MeshBasicMaterial({color: 0xff5500}));
            m.position.copy(pos);
            scene.add(m);
            // Hijack the flame array for debris
            engineFlames.push({mesh: m, life: 2.0, isDebris: true, vel: new THREE.Vector3((Math.random()-0.5)*50, (Math.random()-0.5)*50, (Math.random()-0.5)*50)});
        }
    }

    // --- Main Game Loop ---
    const clock = new THREE.Clock();
    let speed = 200;
    let lastFire = 0;

    function animate() {
        requestAnimationFrame(animate);
        const dt = Math.min(clock.getDelta(), 0.05);

        if (isPlaying) {
            // 1. Mouse-Aim Physics
            // Calculate where the plane *wants* to look based on mouse
            const targetRotX = mouse.y * 1.5; // Pitch
            const targetRotY = -mouse.x * 1.5; // Yaw
            const targetRotZ = mouse.x * 2.0;  // Roll (bank into turns)

            // Smoothly interpolate current rotation to target rotation
            const currentEuler = new THREE.Euler().setFromQuaternion(plane.quaternion, 'YXZ');
            currentEuler.x += (targetRotX - currentEuler.x) * 3 * dt;
            currentEuler.y += (targetRotY) * 2 * dt; // Continuous turning
            currentEuler.z += (targetRotZ - currentEuler.z) * 5 * dt;
            
            plane.quaternion.setFromEuler(currentEuler);

            // 2. Speed and Engine
            if (input.throttle) speed += 150 * dt;
            if (input.brake) speed -= 200 * dt;
            speed = Math.max(150, Math.min(600, speed)); // Clamped speed

            // Move forward
            const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(plane.quaternion);
            plane.position.add(forward.clone().multiplyScalar(speed * dt));

            // Engine details
            if (input.throttle) {
                createEngineFlame();
                createEngineFlame();
            }

            // 3. Camera Dynamics
            // Stiffer camera that shakes slightly based on speed
            const camOffset = new THREE.Vector3(0, 4, 15).applyQuaternion(plane.quaternion);
            camera.position.lerp(plane.position.clone().add(camOffset), 15 * dt);
            
            // Camera shake at high speeds
            if (speed > 400) {
                camera.position.x += (Math.random() - 0.5) * 0.2;
                camera.position.y += (Math.random() - 0.5) * 0.2;
            }
            
            camera.lookAt(plane.position.clone().add(forward.clone().multiplyScalar(100)));

            // 4. Weapons
            if (input.firing && clock.elapsedTime - lastFire > 0.08) {
                const b = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.2, 10), new THREE.MeshBasicMaterial({color: 0xff3300}));
                // Offset guns to the wings
                const rightGun = plane.position.clone().add(new THREE.Vector3(1, 0, -2).applyQuaternion(plane.quaternion));
                const leftGun = plane.position.clone().add(new THREE.Vector3(-1, 0, -2).applyQuaternion(plane.quaternion));
                
                b.position.copy(Math.random() > 0.5 ? rightGun : leftGun);
                b.quaternion.copy(plane.quaternion);
                scene.add(b);
                bullets.push({ mesh: b, life: 1.5, vel: forward.clone().multiplyScalar(1500) });
                lastFire = clock.elapsedTime;
            }

            // 5. Particles Update
            for (let i = engineFlames.length - 1; i >= 0; i--) {
                let p = engineFlames[i];
                p.life -= dt * (p.isDebris ? 1 : 4);
                if(p.isDebris) {
                    p.mesh.position.add(p.vel.clone().multiplyScalar(dt));
                } else {
                    // Normal flame falls behind plane
                    p.mesh.position.add(forward.clone().multiplyScalar(-speed * 0.5 * dt));
                }
                p.mesh.scale.setScalar(Math.max(0, p.life));
                if (p.life <= 0) { scene.remove(p.mesh); engineFlames.splice(i, 1); }
            }

            // 6. Bullets & Combat
            for (let i = bullets.length - 1; i >= 0; i--) {
                let b = bullets[i];
                b.mesh.position.add(b.vel.clone().multiplyScalar(dt));
                b.life -= dt;
                
                let hit = false;
                for (let j = enemies.length - 1; j >= 0; j--) {
                    if (b.mesh.position.distanceTo(enemies[j].mesh.position) < 8) {
                        enemies[j].hp--;
                        hit = true;
                        if(enemies[j].hp <= 0) {
                            explode(enemies[j].mesh.position);
                            scene.remove(enemies[j].mesh);
                            enemies.splice(j, 1);
                            setTimeout(spawnEnemy, 2000); // Send reinforcements
                        }
                        break;
                    }
                }

                if (hit || b.life <= 0) { scene.remove(b.mesh); bullets.splice(i, 1); }
            }

            // 7. Enemy AI (Simple chase)
            for (let e of enemies) {
                const toPlayer = plane.position.clone().sub(e.mesh.position).normalize();
                const targetQ = new THREE.Quaternion().setFromUnitVectors(new THREE.Vector3(0,0,-1), toPlayer);
                e.mesh.quaternion.slerp(targetQ, 1.5 * dt);
                const eFwd = new THREE.Vector3(0,0,-1).applyQuaternion(e.mesh.quaternion);
                e.mesh.position.add(eFwd.multiplyScalar(250 * dt));
            }
        } else {
            // Menu background camera spin
            camera.position.set(Math.sin(clock.elapsedTime * 0.2) * 2000, 1000, Math.cos(clock.elapsedTime * 0.2) * 2000);
            camera.lookAt(0, 500, 0);
        }

        renderer.render(scene, camera);
    }

    // Handle Window Resize
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    animate();
</script>
</body>
</html>
