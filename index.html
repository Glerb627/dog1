<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OPERATION: CANYON RUN</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
        
        body, html { margin: 0; padding: 0; overflow: hidden; background-color: #000; user-select: none; font-family: 'Share Tech Mono', monospace; }
        canvas { display: block; }
        
        #menu {
            position: absolute; inset: 0; background: radial-gradient(circle, rgba(20,5,5,0.85) 0%, rgba(0,0,0,1) 100%);
            display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10;
        }
        
        #menu::after {
            content: " "; display: block; position: absolute; inset: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%);
            z-index: 2; background-size: 100% 2px; pointer-events: none;
        }

        h1 { color: #ff5500; font-size: 5rem; margin: 0; letter-spacing: 8px; text-shadow: 0px 0px 15px #ff5500; z-index: 3;}
        .subtitle { color: #aaa; font-size: 1.2rem; margin-bottom: 40px; letter-spacing: 5px; z-index: 3;}
        
        .briefing { border-left: 2px solid #ff5500; padding-left: 15px; color: #ccc; margin-bottom: 40px; max-width: 600px; z-index: 3;}
        
        .btn {
            padding: 15px 40px; background: transparent; color: #ff5500; border: 2px solid #ff5500;
            font-size: 1.5rem; font-family: inherit; cursor: pointer; text-transform: uppercase; letter-spacing: 3px;
            transition: all 0.2s; z-index: 3;
        }
        .btn:hover { background: #ff5500; color: #000; box-shadow: 0 0 20px #ff5500; }
        
        #crosshair {
            position: absolute; top: 50%; left: 50%; width: 30px; height: 30px;
            border: 2px solid rgba(255, 255, 255, 0.2); border-radius: 50%;
            transform: translate(-50%, -50%); pointer-events: none; display: none; z-index: 5;
        }
        #crosshair::before, #crosshair::after {
            content: ''; position: absolute; background: rgba(255, 80, 0, 0.8);
        }
        #crosshair::before { top: 14px; left: -10px; right: -10px; height: 2px; }
        #crosshair::after { left: 14px; top: -10px; bottom: -10px; width: 2px; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="menu">
        <h1>CANYON RUN</h1>
        <div class="subtitle">SCRAMBLE ORDER ISSUED</div>
        <div class="briefing">
            <p>> STATUS: GROUNDED ON AIRSTRIP ALPHA.</p>
            <p>> TAKEOFF: HOLD [W] TO THROTTLE UP. PULL MOUSE DOWN TO LIFT OFF ONCE SPEED > 200.</p>
            <p>> FLIGHT: MOUSE TO STEER. LEFT CLICK TO FIRE CANNONS.</p>
            <p>> COMBAT: ENGAGE HOSTILE RED DRONES IN THE CANYON.</p>
        </div>
        <button class="btn" id="start-btn">Initiate Takeoff</button>
    </div>

    <div id="crosshair"></div>

<script>
    let isPlaying = false;
    let isAirborne = false;

    const menu = document.getElementById('menu');
    const startBtn = document.getElementById('start-btn');
    const crosshair = document.getElementById('crosshair');

    startBtn.addEventListener('click', () => {
        menu.style.display = 'none';
        crosshair.style.display = 'block';
        isPlaying = true;
        document.body.requestPointerLock();
    });

    // --- Scene & Sunset Lighting ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x2a1005); // Deep orange/brown sky
    scene.fog = new THREE.FogExp2(0x2a1005, 0.0004); // Thick canyon dust

    const camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 15000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const ambientLight = new THREE.AmbientLight(0x221111, 1.5);
    scene.add(ambientLight);
    const sunLight = new THREE.DirectionalLight(0xff6600, 2);
    sunLight.position.set(2000, 500, -5000);
    scene.add(sunLight);

    // --- Procedural Environment ---
    // Canyon Terrain
    const terrainGeo = new THREE.PlaneGeometry(20000, 20000, 150, 150);
    terrainGeo.rotateX(-Math.PI / 2);
    const pos = terrainGeo.attributes.position;
    for (let i = 0; i < pos.count; i++) {
        let x = pos.getX(i);
        let z = pos.getZ(i);
        // Create a flat valley in the center (x near 0) and steep mountains on sides
        let valleyFactor = Math.min(1, Math.abs(x) / 1500); 
        let y = (Math.sin(x/400)*300 + Math.cos(z/400)*300) * valleyFactor;
        y += (Math.sin(x/100)*50 + Math.cos(z/100)*50); // Noise
        if (y < 0) y = 0;
        pos.setY(i, y);
    }
    terrainGeo.computeVertexNormals();
    const terrainMat = new THREE.MeshStandardMaterial({ color: 0x3a1b0b, roughness: 1.0, flatShading: true });
    const terrain = new THREE.Mesh(terrainGeo, terrainMat);
    scene.add(terrain);

    // The Runway
    const runwayGeo = new THREE.PlaneGeometry(150, 6000);
    runwayGeo.rotateX(-Math.PI / 2);
    const runwayMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.8 });
    const runway = new THREE.Mesh(runwayGeo, runwayMat);
    runway.position.set(0, 1, -2000); // Placed slightly above terrain to prevent clipping
    scene.add(runway);

    // --- Improved Stealth Fighter Model ---
    const plane = new THREE.Group();
    const hullMat = new THREE.MeshStandardMaterial({ color: 0x151515, roughness: 0.4, metalness: 0.6 });
    const glassMat = new THREE.MeshStandardMaterial({ color: 0x000000, roughness: 0.1, metalness: 0.9 });

    // Sleek Body
    const bodyGeo = new THREE.BoxGeometry(1.2, 0.8, 6);
    const body = new THREE.Mesh(bodyGeo, hullMat);
    body.position.set(0, 0, 0);
    plane.add(body);

    // Pointed Nose
    const noseGeo = new THREE.ConeGeometry(0.6, 3, 4);
    noseGeo.rotateX(-Math.PI / 2);
    noseGeo.rotateZ(Math.PI / 4); // Diamond shape
    const nose = new THREE.Mesh(noseGeo, hullMat);
    nose.position.set(0, 0, -4.5);
    plane.add(nose);

    // Cockpit Canopy
    const pitGeo = new THREE.BoxGeometry(0.8, 0.6, 2.5);
    const pit = new THREE.Mesh(pitGeo, glassMat);
    pit.position.set(0, 0.6, -1);
    plane.add(pit);

    // Swept Delta Wings
    const wingShape = new THREE.Shape();
    wingShape.moveTo(0, 0); wingShape.lineTo(6, 2); wingShape.lineTo(6, 3); wingShape.lineTo(0, 3);
    const wingGeo = new THREE.ExtrudeGeometry(wingShape, { depth: 0.1, bevelEnabled: false });
    const rWing = new THREE.Mesh(wingGeo, hullMat);
    rWing.rotation.x = Math.PI / 2; rWing.position.set(0.6, 0, -1);
    plane.add(rWing);
    const lWing = new THREE.Mesh(wingGeo, hullMat);
    lWing.rotation.x = Math.PI / 2; lWing.rotation.z = Math.PI; lWing.position.set(-0.6, 0, -1);
    plane.add(lWing);

    // V-Tail Fins
    const tailGeo = new THREE.BoxGeometry(0.1, 1.8, 2);
    const rTail = new THREE.Mesh(tailGeo, hullMat);
    rTail.position.set(0.8, 0.8, 2); rTail.rotation.z = -0.3;
    plane.add(rTail);
    const lTail = new THREE.Mesh(tailGeo, hullMat);
    lTail.position.set(-0.8, 0.8, 2); lTail.rotation.z = 0.3;
    plane.add(lTail);

    plane.position.set(0, 2.5, 500); // Start at the beginning of the runway
    scene.add(plane);

    // --- Variables & Arrays ---
    const bullets = [];
    const enemies = [];
    const engineTrails = [];
    const input = { throttle: 0, brake: false, firing: false };
    const mouse = { x: 0, y: 0 }; 

    // --- Inputs ---
    document.addEventListener('mousemove', (e) => {
        if (!isPlaying) return;
        mouse.x += e.movementX * 0.002;
        mouse.y += e.movementY * 0.002;
        mouse.x = Math.max(-1, Math.min(1, mouse.x));
        mouse.y = Math.max(-1, Math.min(1, mouse.y));
    });

    // Auto-center mouse
    setInterval(() => { if(isPlaying) { mouse.x *= 0.90; mouse.y *= 0.90; } }, 50);

    window.addEventListener('keydown', (e) => {
        if (e.key.toLowerCase() === 'w') input.throttle = 1;
        if (e.key.toLowerCase() === 's') input.brake = true;
    });
    window.addEventListener('keyup', (e) => {
        if (e.key.toLowerCase() === 'w') input.throttle = 0;
        if (e.key.toLowerCase() === 's') input.brake = false;
    });
    window.addEventListener('mousedown', () => input.firing = true);
    window.addEventListener('mouseup', () => input.firing = false);

    // --- Visual FX ---
    function spawnExplosion(pos) {
        for(let i=0; i<20; i++) {
            const m = new THREE.Mesh(new THREE.BoxGeometry(3,3,3), new THREE.MeshBasicMaterial({color: 0xff4400}));
            m.position.copy(pos);
            scene.add(m);
            engineTrails.push({mesh: m, life: 1.5, isDebris: true, vel: new THREE.Vector3((Math.random()-0.5)*80, (Math.random()-0.5)*80, (Math.random()-0.5)*80)});
        }
    }

    // --- Enemy Logic ---
    function spawnEnemy() {
        const eGroup = new THREE.Group();
        // Flying Wing Drone Shape
        const droneGeo = new THREE.BoxGeometry(8, 0.5, 3);
        const drone = new THREE.Mesh(droneGeo, new THREE.MeshStandardMaterial({color: 0x222222}));
        eGroup.add(drone);
        
        // Glowing Red Engine core to make them super visible
        const glow = new THREE.Mesh(new THREE.BoxGeometry(2, 0.6, 3.1), new THREE.MeshBasicMaterial({color: 0xff0000}));
        eGroup.add(glow);

        // Spawn far ahead and slightly above player
        eGroup.position.set(
            plane.position.x + (Math.random() - 0.5) * 1000,
            Math.max(200, plane.position.y + (Math.random() * 500)),
            plane.position.z - 3000 - Math.random() * 2000
        );
        scene.add(eGroup);
        enemies.push({ mesh: eGroup, hp: 4, lastTrail: 0 });
    }

    // --- Main Loop ---
    const clock = new THREE.Clock();
    let speed = 0; // Start at 0 on runway
    let lastFire = 0;

    function animate() {
        requestAnimationFrame(animate);
        const dt = Math.min(clock.getDelta(), 0.05);

        if (isPlaying) {
            // 1. Controls & Physics Engine
            const targetPitch = mouse.y * 1.5; 
            const targetYaw = -mouse.x * 1.5;
            const targetRoll = mouse.x * 2.5;

            const currentEuler = new THREE.Euler().setFromQuaternion(plane.quaternion, 'YXZ');
            
            // Speed logic
            if (input.throttle) speed += 100 * dt;
            if (input.brake) speed -= 150 * dt;
            
            if (!isAirborne) {
                // GROUND STATE (Takeoff Run)
                speed = Math.max(0, Math.min(300, speed)); // Can't go too fast on ground
                speed *= 0.99; // Ground friction
                
                // Lock rotation constraints
                currentEuler.x = 0; // Flat on ground
                currentEuler.y += targetYaw * dt; // Can steer slightly like a car
                currentEuler.z = 0; // No rolling

                // Lift off logic! If going fast enough and pulling UP (mouse down, positive pitch)
                if (speed > 180 && targetPitch > 0.2) {
                    isAirborne = true;
                }
            } else {
                // FLIGHT STATE
                speed = Math.max(100, Math.min(600, speed)); // Air speed bounds
                if (!input.throttle && !input.brake) speed *= 0.999; // Slight air drag

                // Apply smooth 3D rotations
                currentEuler.x += (targetPitch - currentEuler.x) * 4 * dt;
                currentEuler.y += targetYaw * 1.5 * dt;
                currentEuler.z += (targetRoll - currentEuler.z) * 5 * dt;

                // Check for crashing into the ground
                if (plane.position.y < 5) {
                    spawnExplosion(plane.position);
                    isAirborne = false;
                    speed = 0;
                    plane.position.set(0, 2.5, 500); // Respawn on runway
                    plane.quaternion.identity(); // Reset rotation
                }
            }
            
            plane.quaternion.setFromEuler(currentEuler);

            // Move Forward
            const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(plane.quaternion);
            plane.position.add(forward.clone().multiplyScalar(speed * dt));

            // Engine Afterburner Trail
            if (input.throttle && speed > 50) {
                const trail = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.5, 0.5), new THREE.MeshBasicMaterial({color: 0xff7700, transparent: true, opacity: 0.8}));
                trail.position.copy(plane.position).add(forward.clone().multiplyScalar(-3));
                scene.add(trail);
                engineTrails.push({mesh: trail, life: 0.5, isDebris: false});
            }

            // 2. Camera Tracking
            const camHeight = isAirborne ? 4 : 3;
            const camDist = isAirborne ? 15 : 12;
            const camOffset = new THREE.Vector3(0, camHeight, camDist).applyQuaternion(plane.quaternion);
            camera.position.lerp(plane.position.clone().add(camOffset), 15 * dt);
            
            // Screen shake at high speeds
            if (speed > 450) {
                camera.position.x += (Math.random() - 0.5) * 0.3;
                camera.position.y += (Math.random() - 0.5) * 0.3;
            }
            camera.lookAt(plane.position.clone().add(forward.clone().multiplyScalar(100)));

            // 3. Weapons
            if (input.firing && clock.elapsedTime - lastFire > 0.08) {
                const b = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.2, 8), new THREE.MeshBasicMaterial({color: 0xffaa00}));
                b.position.copy(plane.position).add(forward.clone().multiplyScalar(2));
                b.quaternion.copy(plane.quaternion);
                scene.add(b);
                bullets.push({ mesh: b, life: 2.0, vel: forward.clone().multiplyScalar( speed + 1000 ) });
                lastFire = clock.elapsedTime;
            }

            // 4. Update Bullets & Enemy Collisions
            for (let i = bullets.length - 1; i >= 0; i--) {
                let b = bullets[i];
                b.mesh.position.add(b.vel.clone().multiplyScalar(dt));
                b.life -= dt;
                
                let hit = false;
                for (let j = enemies.length - 1; j >= 0; j--) {
                    if (b.mesh.position.distanceTo(enemies[j].mesh.position) < 10) {
                        enemies[j].hp--;
                        hit = true;
                        if(enemies[j].hp <= 0) {
                            spawnExplosion(enemies[j].mesh.position);
                            scene.remove(enemies[j].mesh);
                            enemies.splice(j, 1);
                            setTimeout(spawnEnemy, 1500); // Send next enemy
                        }
                        break;
                    }
                }
                if (hit || b.life <= 0) { scene.remove(b.mesh); bullets.splice(i, 1); }
            }

            // 5. Enemy AI & Red Contrails
            if (enemies.length < 5 && isAirborne) {
                // Keep spawning enemies once you take off
                if(Math.random() < 0.01) spawnEnemy(); 
            }

            for (let e of enemies) {
                // Enemies drop red contrails to be highly visible
                if (clock.elapsedTime - e.lastTrail > 0.05) {
                    const rTrail = new THREE.Mesh(new THREE.BoxGeometry(1, 1, 1), new THREE.MeshBasicMaterial({color: 0xff0000, transparent: true, opacity: 0.6}));
                    rTrail.position.copy(e.mesh.position);
                    scene.add(rTrail);
                    engineTrails.push({mesh: rTrail, life: 1.0, isDebris: false});
                    e.lastTrail = clock.elapsedTime;
                }

                // AI flies towards player
                const toPlayer = plane.position.clone().sub(e.mesh.position).normalize();
                const targetQ = new THREE.Quaternion().setFromUnitVectors(new THREE.Vector3(0,0,-1), toPlayer);
                e.mesh.quaternion.slerp(targetQ, 1.0 * dt);
                const eFwd = new THREE.Vector3(0,0,-1).applyQuaternion(e.mesh.quaternion);
                e.mesh.position.add(eFwd.multiplyScalar(300 * dt)); // Enemy speed
            }

            // 6. Update Trails/Debris
            for (let i = engineTrails.length - 1; i >= 0; i--) {
                let p = engineTrails[i];
                p.life -= dt * (p.isDebris ? 1 : 2);
                if(p.isDebris) p.mesh.position.add(p.vel.clone().multiplyScalar(dt));
                p.mesh.scale.setScalar(Math.max(0, p.life));
                if (p.life <= 0) { scene.remove(p.mesh); engineTrails.splice(i, 1); }
            }

        } else {
            // Menu Camera Pan over the runway
            camera.position.set(100, 50, 600);
            camera.lookAt(0, 10, 0);
        }

        renderer.render(scene, camera);
    }

    // Handle Resize
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    animate();
</script>
</body>
</html>
