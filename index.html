<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tactical Flight: Lethal Terrain</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
        
        body, html { margin: 0; padding: 0; overflow: hidden; background-color: #000; user-select: none; font-family: 'Share Tech Mono', monospace; }
        canvas { display: block; }
        
        #menu {
            position: absolute; inset: 0; background: radial-gradient(circle, rgba(20,25,30,0.9) 0%, rgba(0,0,0,1) 100%);
            display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10;
        }
        
        h1 { color: #fff; font-size: 4rem; margin: 0; letter-spacing: 5px; text-shadow: 0px 0px 10px #ffffff55; }
        .subtitle { color: #8899aa; font-size: 1.2rem; margin-bottom: 40px; letter-spacing: 3px; }
        
        .briefing { border-left: 2px solid #fff; padding-left: 15px; color: #ccc; margin-bottom: 40px; max-width: 600px; font-size: 1.1rem; line-height: 1.5; }
        .alert { color: #ff3333; font-weight: bold; }
        
        .btn {
            padding: 15px 40px; background: transparent; color: #fff; border: 2px solid #fff;
            font-size: 1.5rem; font-family: inherit; cursor: pointer; text-transform: uppercase; letter-spacing: 3px;
            transition: all 0.2s;
        }
        .btn:hover { background: #fff; color: #000; box-shadow: 0 0 20px #fff; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="menu">
        <h1>TACTICAL FLIGHT</h1>
        <div class="subtitle">F-SERIES PROTOTYPE TEST</div>
        <div class="briefing">
            <p>> CONTROLS: <strong>WASD</strong> TO PITCH AND ROLL.</p>
            <p>> THROTTLE: HOLD <strong>[SPACEBAR]</strong> TO IGNITE AFTERBURNERS.</p>
            <p>> TAKEOFF: HOLD SPACE TO ACCELERATE. ONCE MOVING, HOLD <strong>[S]</strong> TO PULL UP.</p>
            <p class="alert">> WARNING: TERRAIN COLLISION IS LETHAL. DO NOT HIT THE MOUNTAINS.</p>
        </div>
        <button class="btn" id="start-btn">Clear for Takeoff</button>
    </div>

<script>
    let isPlaying = false;
    let isAirborne = false;

    const menu = document.getElementById('menu');
    document.getElementById('start-btn').addEventListener('click', () => {
        menu.style.display = 'none';
        isPlaying = true;
    });

    // --- Scene Setup (Stormy / High Contrast) ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x2b3a42); // Moody storm blue/grey
    scene.fog = new THREE.FogExp2(0x2b3a42, 0.0004); // Blends terrain into sky

    const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 15000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const ambientLight = new THREE.AmbientLight(0x405060, 1.2);
    scene.add(ambientLight);
    const dirLight = new THREE.DirectionalLight(0xffeedd, 1.5);
    dirLight.position.set(5000, 3000, -2000);
    scene.add(dirLight);

    // --- Core Terrain Math (Used for both graphics AND lethal collision) ---
    function getTerrainElevation(x, z) {
        // Create a massive flat runway canyon in the center
        if (x > -150 && x < 150 && z < 1000 && z > -10000) return 0; 
        
        let distFromRunway = Math.max(0, Math.abs(x) - 150);
        let mountainScale = Math.min(1, distFromRunway / 1000); // Rises sharply past the runway
        
        // Complex rolling math for mountain peaks
        let height = (Math.sin(x/400)*500 + Math.cos(z/400)*500);
        height += (Math.sin(x/100)*150 + Math.cos(z/100)*150); 
        
        return Math.max(0, height * mountainScale);
    }

    // --- Generate Mountain Mesh ---
    const terrainGeo = new THREE.PlaneGeometry(20000, 20000, 150, 150);
    terrainGeo.rotateX(-Math.PI / 2);
    const pos = terrainGeo.attributes.position;
    for (let i = 0; i < pos.count; i++) {
        let x = pos.getX(i);
        let z = pos.getZ(i);
        pos.setY(i, getTerrainElevation(x, z));
    }
    terrainGeo.computeVertexNormals();
    
    // Gritty, dark green/slate rocky material
    const terrainMat = new THREE.MeshStandardMaterial({ color: 0x1c251c, roughness: 0.9, flatShading: true });
    const terrain = new THREE.Mesh(terrainGeo, terrainMat);
    scene.add(terrain);

    // Dark asphalt runway
    const runwayGeo = new THREE.PlaneGeometry(120, 8000);
    runwayGeo.rotateX(-Math.PI / 2);
    const runwayMat = new THREE.MeshStandardMaterial({ color: 0x0a0a0c, roughness: 0.8 });
    const runway = new THREE.Mesh(runwayGeo, runwayMat);
    runway.position.set(0, 0.5, -3000); // Slightly above ground to prevent glitching
    scene.add(runway);

    // --- F-Series Military Fighter Model ---
    const plane = new THREE.Group();
    const tacGrey = new THREE.MeshStandardMaterial({ color: 0x555560, roughness: 0.6, metalness: 0.4 });
    const darkGlass = new THREE.MeshStandardMaterial({ color: 0x050505, roughness: 0.1, metalness: 0.9 });

    // Fuselage (Sleeker)
    const body = new THREE.Mesh(new THREE.BoxGeometry(1.5, 1, 8), tacGrey);
    plane.add(body);

    // Sharp Nose
    const nose = new THREE.Mesh(new THREE.ConeGeometry(0.75, 3.5, 4), tacGrey);
    nose.rotation.x = -Math.PI / 2;
    nose.rotation.z = Math.PI / 4; 
    nose.position.set(0, 0, -5.75);
    plane.add(nose);

    // Canopy
    const canopy = new THREE.Mesh(new THREE.BoxGeometry(1, 0.8, 3), darkGlass);
    canopy.position.set(0, 0.7, -1.5);
    plane.add(canopy);

    // F-22 Style Swept Wings
    const wingShape = new THREE.Shape();
    wingShape.moveTo(0, 0);       // Root front
    wingShape.lineTo(6, 2.5);     // Tip front (swept heavily back)
    wingShape.lineTo(6, 4);       // Tip back
    wingShape.lineTo(0, 4.5);     // Root back
    
    const wGeo = new THREE.ExtrudeGeometry(wingShape, { depth: 0.1, bevelEnabled: false });
    const rWing = new THREE.Mesh(wGeo, tacGrey);
    rWing.rotation.x = Math.PI / 2;
    rWing.position.set(0.75, 0, -2);
    plane.add(rWing);
    
    const lWing = new THREE.Mesh(wGeo, tacGrey);
    lWing.rotation.x = Math.PI / 2;
    lWing.rotation.z = Math.PI;
    lWing.position.set(-0.75, 0, -2);
    plane.add(lWing);

    // Slanted Tail Stabilizers
    const tailShape = new THREE.Shape();
    tailShape.moveTo(0,0); tailShape.lineTo(1.5, 2); tailShape.lineTo(0, 2);
    const tGeo = new THREE.ExtrudeGeometry(tailShape, { depth: 0.1, bevelEnabled: false });
    
    const rTail = new THREE.Mesh(tGeo, tacGrey);
    rTail.rotation.y = -Math.PI / 2;
    rTail.rotation.x = -0.3; // Slanted outwards
    rTail.position.set(0.5, 0.5, 3.5);
    plane.add(rTail);

    const lTail = new THREE.Mesh(tGeo, tacGrey);
    lTail.rotation.y = -Math.PI / 2;
    lTail.rotation.x = 0.3; // Slanted outwards
    lTail.position.set(-0.5, 0.5, 3.5);
    plane.add(lTail);

    plane.position.set(0, 2, 500); // Start on runway
    scene.add(plane);

    // --- Inputs & Controls ---
    const keys = { w: false, a: false, s: false, d: false, space: false };
    
    window.addEventListener('keydown', (e) => {
        let k = e.key.toLowerCase();
        if (k === ' ') keys.space = true;
        if (k in keys) keys[k] = true;
    });
    window.addEventListener('keyup', (e) => {
        let k = e.key.toLowerCase();
        if (k === ' ') keys.space = false;
        if (k in keys) keys[k] = false;
    });

    // --- FX ---
    const particles = [];
    function spawnExplosion(pos) {
        for(let i=0; i<30; i++) {
            const m = new THREE.Mesh(new THREE.BoxGeometry(4,4,4), new THREE.MeshBasicMaterial({color: 0xff4400}));
            m.position.copy(pos);
            scene.add(m);
            particles.push({ mesh: m, life: 2.0, vel: new THREE.Vector3((Math.random()-0.5)*150, (Math.random()-0.5)*150, (Math.random()-0.5)*150) });
        }
    }

    // --- Main Game Loop ---
    const clock = new THREE.Clock();
    let speed = 0;

    function resetPlane() {
        isAirborne = false;
        speed = 0;
        plane.position.set(0, 2, plane.position.z + 500); // Respawn slightly behind where you died, but center on runway
        if (plane.position.z < -8000) plane.position.z = 500; // Reset entirely if flown too far
        plane.position.x = 0;
        plane.rotation.set(0,0,0);
    }

    function animate() {
        requestAnimationFrame(animate);
        const dt = Math.min(clock.getDelta(), 0.05);

        if (isPlaying) {
            // 1. Acceleration / Ignite
            if (keys.space) {
                speed += 250 * dt; // VERY fast acceleration
                // Afterburner visual
                if (speed > 50) {
                    const flame = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.8, 0.8), new THREE.MeshBasicMaterial({color: 0x00ffff, transparent: true, opacity: 0.8})); // Blue military jet flame
                    const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(plane.quaternion);
                    flame.position.copy(plane.position).add(forward.multiplyScalar(-4.5));
                    scene.add(flame);
                    particles.push({mesh: flame, life: 0.3, vel: new THREE.Vector3(0,0,0)}); // Stationary relative to world
                }
            } else {
                speed *= 0.99; // Air/Ground friction
            }

            // 2. Physics & Controls
            if (!isAirborne) {
                // GROUND STATE
                speed = Math.max(0, Math.min(300, speed));
                
                // Allow A/D to steer slightly on the ground
                if (keys.a) plane.rotateY(1.0 * dt);
                if (keys.d) plane.rotateY(-1.0 * dt);

                // Takeoff mechanism: If moving fast and pulling UP (S key)
                if (speed > 120 && keys.s) {
                    isAirborne = true;
                }
                
                // Keep plane flush with ground
                plane.position.y = getTerrainElevation(plane.position.x, plane.position.z) + 2;
                // Force plane to stay level on ground
                plane.rotation.z = 0; 
                plane.rotation.x = 0;
                
            } else {
                // FLIGHT STATE
                speed = Math.max(80, Math.min(800, speed));
                
                // Strict WASD rotations (local axes)
                if (keys.w) plane.rotateX(2.0 * dt);  // Pitch down
                if (keys.s) plane.rotateX(-2.0 * dt); // Pitch up (pull stick back)
                if (keys.a) plane.rotateZ(3.0 * dt);  // Roll left
                if (keys.d) plane.rotateZ(-3.0 * dt); // Roll right

                // Lethal Terrain Collision Check!
                let currentGroundHeight = getTerrainElevation(plane.position.x, plane.position.z);
                if (plane.position.y <= currentGroundHeight + 1) {
                    spawnExplosion(plane.position);
                    resetPlane();
                }
            }

            // Move the plane forward locally (-Z direction)
            plane.translateZ(-speed * dt);

            // 3. Rigid Chase Camera
            const camOffset = new THREE.Vector3(0, 5, 18).applyQuaternion(plane.quaternion);
            camera.position.lerp(plane.position.clone().add(camOffset), 12 * dt);
            
            // Screen shake at high speeds
            if (speed > 400) {
                camera.position.x += (Math.random() - 0.5) * 0.4;
                camera.position.y += (Math.random() - 0.5) * 0.4;
            }
            
            const forwardVector = new THREE.Vector3(0, 0, -1).applyQuaternion(plane.quaternion);
            camera.lookAt(plane.position.clone().add(forwardVector.multiplyScalar(100)));

            // 4. Update Particles (Flames and Explosions)
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.life -= dt;
                p.mesh.position.add(p.vel.clone().multiplyScalar(dt));
                p.mesh.scale.setScalar(Math.max(0, p.life));
                if (p.life <= 0) { scene.remove(p.mesh); particles.splice(i, 1); }
            }

        } else {
            // Cinematic Menu Camera
            camera.position.set(100, 30, 600);
            camera.lookAt(0, 10, 0);
        }

        renderer.render(scene, camera);
    }

    // Handle Resize
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    animate();
</script>
</body>
</html>
